services:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: app
    container_name: ai_afs_backend
    restart: unless-stopped
    env_file: .env
    environment:
      - CACHE_DIR=/data/cache
      - UPLOAD_DIR=/data/uploads
      - CORS_ORIGINS=http://localhost,http://localhost:80,http://frontend
    volumes:
      - ai_afs_cache:/data/cache
      - ai_afs_uploads:/data/uploads
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: ai_afs_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  ai_afs_cache:
    driver: local
  ai_afs_uploads:
    driver: local
